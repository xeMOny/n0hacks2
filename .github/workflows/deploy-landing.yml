name: Deploy Landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-lms/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web-lms/package-lock.json
      - name: Install dependencies
        working-directory: apps/web-lms
        run: npm ci
      - name: Build
        working-directory: apps/web-lms
        run: npm run build
      - name: Add custom domain CNAME
        run: echo "uclcampus.com" > apps/web-lms/dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-lms/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
