name: Deploy Landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-lms/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ============================================================
      # MODO "EN CONSTRUCCIÓN"
      # Mientras la web no es pública (cambio de nombre en la MFHEA
      # pendiente), uclcampus.com sirve SOLO una página de "en
      # construcción" (apps/web-lms/coming-soon/). La web completa se
      # revisa en el entorno privado preview.uclcampus.com (repo
      # xeMOny/ucl-preview), noindex y sin enlazar.
      #
      # PARA VOLVER A PUBLICAR LA WEB REAL: revertir este commit
      # (`git revert`), lo que restaura el build + prerender del sitio
      # completo (setup-node, npm ci, Chrome, npm run build, dist).
      # ============================================================
      - name: Publicar página de "en construcción"
        working-directory: apps/web-lms
        run: |
          rm -rf _site && mkdir _site
          cp coming-soon/index.html _site/index.html
          cp coming-soon/index.html _site/404.html
          cp public/favicon.svg _site/favicon.svg
          echo "uclcampus.com" > _site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-lms/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
