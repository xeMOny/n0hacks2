# Malta Campus · reverse proxy
# TODO tras registrar el dominio: apuntar DNS y activar certbot para SSL en cada server_name.

events {}

http {
  # DNS embebido de Docker: resuelve los nombres de servicio en tiempo de petición
  # (no al arrancar nginx), para que un redeploy de un servicio no tumbe el proxy.
  resolver 127.0.0.11 valid=10s;

  client_max_body_size 20m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  server {
    listen 80;
    server_name uclcampus.com www.uclcampus.com;

    location /api/ {
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/;
    }

    location / {
      set $upstream_lms http://web-lms:80;
      proxy_pass $upstream_lms;
    }
  }

  server {
    listen 80;
    server_name crm.uclcampus.com;

    location /api/ {
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/;
    }

    location / {
      set $upstream_crm http://web-crm:80;
      proxy_pass $upstream_crm;
    }
  }

  server {
    listen 80;
    server_name intranet.uclcampus.com;

    location /api/ {
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/;
    }

    location / {
      set $upstream_intranet http://web-intranet:80;
      proxy_pass $upstream_intranet;
    }
  }
}
