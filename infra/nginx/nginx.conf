# Malta Campus · reverse proxy
#
# Bootstrap de TLS (primera vez, sin certificados aún): ver infra/DEPLOY.md
# — nginx no arranca si ssl_certificate apunta a un archivo que no existe,
# así que hay una secuencia de 2 pasos (cert temporal -> certbot -> real).

events {}

http {
  # DNS embebido de Docker: resuelve los nombres de servicio en tiempo de petición
  # (no al arrancar nginx), para que un redeploy de un servicio no tumbe el proxy.
  resolver 127.0.0.11 valid=10s;

  client_max_body_size 20m;
  server_tokens off;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  # --- HTTP: solo ACME challenge + redirect a HTTPS ---
  server {
    listen 80;
    server_name uclcampus.com www.uclcampus.com crm.uclcampus.com intranet.uclcampus.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # --- HTTPS: uclcampus.com (landing + LMS) ---
  server {
    listen 443 ssl;
    http2 on;
    server_name uclcampus.com www.uclcampus.com;

    ssl_certificate     /etc/letsencrypt/live/uclcampus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uclcampus.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;

    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/auth/;
    }

    location /api/ {
      limit_req zone=general burst=20 nodelay;
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/;
    }

    location / {
      set $upstream_lms http://web-lms:8080;
      proxy_pass $upstream_lms;
    }
  }

  # --- HTTPS: crm.uclcampus.com ---
  server {
    listen 443 ssl;
    http2 on;
    server_name crm.uclcampus.com;

    ssl_certificate     /etc/letsencrypt/live/uclcampus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uclcampus.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;

    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/auth/;
    }

    location /api/ {
      limit_req zone=general burst=20 nodelay;
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/;
    }

    location / {
      set $upstream_crm http://web-crm:8080;
      proxy_pass $upstream_crm;
    }
  }

  # --- HTTPS: intranet.uclcampus.com ---
  server {
    listen 443 ssl;
    http2 on;
    server_name intranet.uclcampus.com;

    ssl_certificate     /etc/letsencrypt/live/uclcampus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uclcampus.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;

    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/auth/;
    }

    location /api/ {
      limit_req zone=general burst=20 nodelay;
      set $upstream_api http://api:4000;
      proxy_pass $upstream_api/api/;
    }

    location / {
      set $upstream_intranet http://web-intranet:8080;
      proxy_pass $upstream_intranet;
    }
  }
}
