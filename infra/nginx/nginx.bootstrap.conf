# Config temporal SOLO para el primer arranque, antes de tener certificados
# TLS reales. Sirve el reto ACME de certbot y nada más. Una vez emitidos los
# certificados (paso 6 de DEPLOY.md), se sustituye por nginx.conf (el bueno,
# con los bloques 443) y se recarga nginx. No usar esto en producción normal.

events {}

http {
  resolver 127.0.0.11 valid=10s;
  server_tokens off;

  server {
    listen 80;
    server_name api.uclcampus.com crm.uclcampus.com intranet.uclcampus.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 200 "Bootstrap en curso, TLS pendiente de emitir.\n";
      add_header Content-Type text/plain;
    }
  }
}
