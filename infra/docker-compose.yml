services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: malta
      POSTGRES_USER: malta
      # Sin fallback: si POSTGRES_PASSWORD no está en .env, el arranque falla
      # en vez de crear la base con una contraseña "changeme" pública en este repo.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malta -d malta"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgres://malta:${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}@postgres:5432/malta
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en .env (mínimo 32 caracteres aleatorios)}
      CORS_ORIGIN: ${CORS_ORIGIN:?Define CORS_ORIGIN en .env, p.ej. https://uclcampus.com,https://crm.uclcampus.com,https://intranet.uclcampus.com}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-lms:
    build: ../apps/web-lms
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-crm:
    build: ../apps/web-crm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-intranet:
    build: ../apps/web-intranet
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      web-lms:
        condition: service_healthy
      web-crm:
        condition: service_healthy
      web-intranet:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Sin "command:": el entrypoint por defecto de la imagen es el binario
    # certbot. No se arranca con "docker compose up" a secas — DEPLOY.md
    # siempre lo referencia por nombre explícito (up postgres api ... / run
    # certbot ...), así que este servicio solo actúa cuando se invoca así.

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:
